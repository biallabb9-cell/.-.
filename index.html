<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطاعم عين التوتة المتميزة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; border-radius: 10px; height: 150px; object-fit: cover; }
        h1 { color: #e67e22; }
        .btn { display: inline-block; background: #e67e22; color: white; padding: 10px 20px; text-decoration: none; border-radius: 25px; margin-top: 10px; font-weight: bold; }
        .footer { margin-top: 50px; font-size: 0.8em; color: #777; }
    </style>
</head>
<body>

    <h1>🍔 دليل مطاعم عين التوتة المتميزة 🍕</h1>
    <p>اختر مطعمك المفضل واطلب مباشرة بكل سهولة</p>

    <div class="container">
        <div class="card">
            <img src="https://via.placeholder.com/300x150?text=Restaurant+Bello" alt="مطعم بيلو">
            <h3>مطعم بيلو (Bello)</h3>
            <p>أفضل بيتزا ومشويات في المنطقة</p>
            <a href="رابط_مطعم_بيلو_من_قسم_منشور" class="btn">اطلب الآن 🛒</a>
        </div>

        </div>

    <div class="footer">
        <p>حقوق النشر محفوظة - منصة عين التوتة للطلبات الرقمية 2024</p>
        <p>نحن نضمن حماية بياناتكم؛ يتم الطلب عبر نظام تشفير آمن.</p>
    </div>

</body>
</html>
