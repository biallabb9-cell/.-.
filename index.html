<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة النرد - تنبأ بالمجموع</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --gold: #f0b429;
    --gold-light: #ffd166;
    --red: #ff4757;
    --green: #2ed573;
    --blue: #70a1ff;
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(240,180,41,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(112,161,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 480px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    text-align: center;
    font-size: 2rem;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: -1px;
    text-shadow: 0 0 30px rgba(240,180,41,0.4);
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.95rem;
    margin-top: -12px;
  }

  /* Prediction buttons */
  .prediction-section label {
    display: block;
    margin-bottom: 10px;
    font-weight: 700;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .prediction-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .pred-btn {
    padding: 18px 8px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .pred-btn .icon { font-size: 1.4rem; }
  .pred-btn .prob { font-size: 0.72rem; font-weight: 400; color: var(--muted); }

  .pred-btn:hover { transform: translateY(-2px); }

  .pred-btn[data-choice="less"].active {
    border-color: var(--blue);
    background: rgba(112,161,255,0.12);
    color: var(--blue);
    box-shadow: 0 0 20px rgba(112,161,255,0.25);
  }
  .pred-btn[data-choice="seven"].active {
    border-color: var(--gold);
    background: rgba(240,180,41,0.12);
    color: var(--gold);
    box-shadow: 0 0 20px rgba(240,180,41,0.25);
  }
  .pred-btn[data-choice="more"].active {
    border-color: var(--red);
    background: rgba(255,71,87,0.12);
    color: var(--red);
    box-shadow: 0 0 20px rgba(255,71,87,0.25);
  }

  /* Dice area */
  .dice-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .dice-row {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .die {
    width: 80px;
    height: 80px;
    background: white;
    border-radius: 14px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    padding: 8px;
    gap: 2px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.8);
    transition: transform 0.1s ease;
  }

  .die.rolling {
    animation: shake 0.5s ease infinite;
  }

  @keyframes shake {
    0%,100% { transform: rotate(0deg) scale(1); }
    20% { transform: rotate(-8deg) scale(1.05); }
    40% { transform: rotate(8deg) scale(0.95); }
    60% { transform: rotate(-5deg) scale(1.05); }
    80% { transform: rotate(5deg) scale(0.95); }
  }

  .dot {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #1a1a2e;
  }

  .dot.hidden { background: transparent; }

  .plus-sign {
    font-size: 2rem;
    font-weight: 900;
    color: var(--muted);
  }

  .total-display {
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(240,180,41,0.5);
    min-height: 60px;
    display: flex;
    align-items: center;
  }

  /* Roll button */
  .roll-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--gold), #e67e22);
    border: none;
    border-radius: 14px;
    color: #0a0a0f;
    font-family: 'Tajawal', sans-serif;
    font-size: 1.2rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 4px 20px rgba(240,180,41,0.3);
    letter-spacing: 0.5px;
  }

  .roll-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(240,180,41,0.45);
  }

  .roll-btn:active:not(:disabled) { transform: scale(0.98); }
  .roll-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Result */
  .result-box {
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    display: none;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .result-box.win {
    display: block;
    background: rgba(46,213,115,0.12);
    border: 2px solid var(--green);
    color: var(--green);
  }

  .result-box.lose {
    display: block;
    background: rgba(255,71,87,0.12);
    border: 2px solid var(--red);
    color: var(--red);
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
  }

  .stat .value {
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--text);
  }

  .stat .key {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Probability hint */
  .prob-hint {
    text-align: center;
    font-size: 0.82rem;
    color: var(--muted);
    padding: 10px;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .highlight { color: var(--gold); font-weight: 700; }
</style>
</head>
<body>
<div class="container">
  <div>
    <h1>🎲 تنبأ بالنرد</h1>
    <p class="subtitle">خمّن مجموع النردين قبل الرمي!</p>
  </div>

  <div class="prediction-section">
    <label>اختر تنبؤك</label>
    <div class="prediction-buttons">
      <button class="pred-btn" data-choice="less" onclick="selectPrediction('less')">
        <span class="icon">📉</span>
        <span>أقل من 7</span>
        <span class="prob">41.7%</span>
      </button>
      <button class="pred-btn" data-choice="seven" onclick="selectPrediction('seven')">
        <span class="icon">🎯</span>
        <span>يساوي 7</span>
        <span class="prob">16.7%</span>
      </button>
      <button class="pred-btn" data-choice="more" onclick="selectPrediction('more')">
        <span class="icon">📈</span>
        <span>أكثر من 7</span>
        <span class="prob">41.7%</span>
      </button>
    </div>
  </div>

  <div class="dice-area">
    <div class="dice-row">
      <div class="die" id="die1">
        <div class="dot hidden"></div><div class="dot hidden"></div><div class="dot hidden"></div>
        <div class="dot hidden"></div><div class="dot hidden"></div><div class="dot hidden"></div>
        <div class="dot hidden"></div><div class="dot hidden"></div><div class="dot hidden"></div>
      </div>
      <span class="plus-sign">+</span>
      <div class="die" id="die2">
        <div class="dot hidden"></div><div class="dot hidden"></div><div class="dot hidden"></div>
        <div class="dot hidden"></div><div class="dot hidden"></div><div class="dot hidden"></div>
        <div class="dot hidden"></div><div class="dot hidden"></div><div class="dot hidden"></div>
      </div>
    </div>
    <div class="total-display" id="totalDisplay">—</div>
  </div>

  <button class="roll-btn" id="rollBtn" onclick="rollDice()" disabled>🎲 ارمِ النرد!</button>

  <div class="result-box" id="resultBox"></div>

  <div class="stats">
    <div class="stat">
      <div class="value" id="totalGames">0</div>
      <div class="key">إجمالي الجولات</div>
    </div>
    <div class="stat">
      <div class="value" id="wins" style="color:var(--green)">0</div>
      <div class="key">تنبؤات صحيحة</div>
    </div>
    <div class="stat">
      <div class="value" id="accuracy">0%</div>
      <div class="key">نسبة الدقة</div>
    </div>
  </div>

  <div class="prob-hint">
    💡 أفضل احتمال: <span class="highlight">أقل من 7</span> أو <span class="highlight">أكثر من 7</span> (41.7% لكل منهما)،<br>
    بينما المجموع <span class="highlight">7</span> هو الأكثر تكراراً كرقم منفرد!
  </div>
</div>

<script>
  // Dot positions for each die face
  const dotMap = {
    1: [4],
    2: [2,6],
    3: [2,4,6],
    4: [0,2,6,8],
    5: [0,2,4,6,8],
    6: [0,2,3,5,6,8]
  };

  let prediction = null;
  let totalGames = 0;
  let wins = 0;

  function selectPrediction(choice) {
    prediction = choice;
    document.querySelectorAll('.pred-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`[data-choice="${choice}"]`).classList.add('active');
    document.getElementById('rollBtn').disabled = false;
    document.getElementById('resultBox').style.display = 'none';
  }

  function renderDie(dieEl, value) {
    const dots = dieEl.querySelectorAll('.dot');
    dots.forEach((dot, i) => {
      dot.className = dotMap[value].includes(i) ? 'dot' : 'dot hidden';
    });
  }

  function rollDice() {
    if (!prediction) return;
    const btn = document.getElementById('rollBtn');
    btn.disabled = true;
    document.getElementById('resultBox').style.display = 'none';
    document.getElementById('totalDisplay').textContent = '—';

    const die1El = document.getElementById('die1');
    const die2El = document.getElementById('die2');
    die1El.classList.add('rolling');
    die2El.classList.add('rolling');

    // Animate random rolls
    let count = 0;
    const interval = setInterval(() => {
      const r1 = Math.floor(Math.random() * 6) + 1;
      const r2 = Math.floor(Math.random() * 6) + 1;
      renderDie(die1El, r1);
      renderDie(die2El, r2);
      count++;
      if (count >= 12) {
        clearInterval(interval);
        die1El.classList.remove('rolling');
        die2El.classList.remove('rolling');
        const final1 = Math.floor(Math.random() * 6) + 1;
        const final2 = Math.floor(Math.random() * 6) + 1;
        renderDie(die1El, final1);
        renderDie(die2El, final2);
        showResult(final1, final2);
      }
    }, 80);
  }

  function showResult(d1, d2) {
    const sum = d1 + d2;
    document.getElementById('totalDisplay').textContent = sum;

    let outcome;
    if (sum < 7) outcome = 'less';
    else if (sum === 7) outcome = 'seven';
    else outcome = 'more';

    const won = outcome === prediction;
    totalGames++;
    if (won) wins++;

    const resultBox = document.getElementById('resultBox');
    resultBox.className = 'result-box ' + (won ? 'win' : 'lose');
    
    const labels = { less: 'أقل من 7', seven: 'يساوي 7', more: 'أكثر من 7' };
    resultBox.textContent = won 
      ? `🎉 تنبؤك صحيح! المجموع ${sum} (${labels[outcome]})`
      : `❌ لم تصب! المجموع ${sum} (${labels[outcome]})`;

    document.getElementById('totalGames').textContent = totalGames;
    document.getElementById('wins').textContent = wins;
    document.getElementById('accuracy').textContent = Math.round((wins/totalGames)*100) + '%';

    // Reset for next round
    setTimeout(() => {
      document.querySelectorAll('.pred-btn').forEach(btn => btn.classList.remove('active'));
      prediction = null;
      document.getElementById('rollBtn').disabled = true;
    }, 300);
  }
</script>
</body>
</html>
