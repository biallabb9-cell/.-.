<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم – عين التونة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDSExHGDT8PDitRG3KO2TsIQsvQxXx0PDA",
    authDomain: "ain-tout.firebaseapp.com",
    projectId: "ain-tout",
    storageBucket: "ain-tout.firebasestorage.app",
    messagingSenderId: "1003001130674",
    appId: "1:1003001130674:web:babc42c6683824b145e3ab"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Admin password
  const ADMIN_PASSWORD = 'aintona2024';

  window.checkPassword = function() {
    const pwd = document.getElementById('pwd-input').value;
    if (pwd === ADMIN_PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      loadAdminMenu();
    } else {
      document.getElementById('pwd-error').style.display = 'block';
      document.getElementById('pwd-input').value = '';
    }
  }

  function loadAdminMenu() {
    const menuCol = collection(db, 'menu');
    onSnapshot(menuCol, (snapshot) => {
      const items = [];
      snapshot.forEach(d => items.push({ id: d.id, ...d.data() }));
      renderAdminMenu(items);
    });
  }

  function renderAdminMenu(items) {
    const grid = document.getElementById('admin-grid');
    grid.innerHTML = '';
    items.forEach(item => {
      const available = item.available !== false;
      const price = item.price || 0;

      grid.innerHTML += `
        <div class="admin-card ${!available ? 'unavailable' : ''}">
          <div class="admin-card-header">
            <div class="admin-card-title">
              <span class="admin-emoji">${item.emoji}</span>
              <span>${item.name}</span>
            </div>
            <div class="status-toggle ${available ? 'available' : 'unavailable'}" onclick="toggleAvailable('${item.id}', ${available})">
              ${available ? '✅ متوفر' : '❌ غير متوفر'}
            </div>
          </div>
          <div class="admin-card-body">
            <div class="price-row">
              <label>السعر (دج)</label>
              <div class="price-input-wrap">
                <input type="number" id="price-${item.id}" value="${price}" placeholder="0 = اسأل عن السعر" class="price-input" min="0">
                <button onclick="updatePrice('${item.id}')" class="save-btn">💾 حفظ</button>
              </div>
            </div>
          </div>
        </div>`;
    });
  }

  window.toggleAvailable = async function(id, currentStatus) {
    try {
      await updateDoc(doc(db, 'menu', id), { available: !currentStatus });
      showToast('✅ تم التحديث!');
    } catch (e) {
      showToast('❌ خطأ في التحديث');
    }
  }

  window.updatePrice = async function(id) {
    const priceInput = document.getElementById(`price-${id}`);
    const price = parseInt(priceInput.value) || 0;
    try {
      await updateDoc(doc(db, 'menu', id), { price });
      showToast('✅ تم حفظ السعر!');
    } catch (e) {
      showToast('❌ خطأ في الحفظ');
    }
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    toast.style.opacity = '1';
    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.style.display = 'none', 400);
    }, 2500);
  }

  // Enter key for password
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('pwd-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') window.checkPassword();
    });
  });
</script>

<style>
  :root {
    --bg: #0a0700;
    --surface: #120e02;
    --card: #1a1504;
    --gold: #d4a017;
    --gold2: #f0c040;
    --amber: #e07b00;
    --text: #fdf5e0;
    --muted: #8a7850;
    --border: #2e2408;
    --border2: #3d3210;
    --green: #22c55e;
    --red: #ef4444;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:"Tajawal",sans-serif; min-height:100vh; }

  /* LOGIN SCREEN */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem;
  }

  .login-box {
    background:var(--card); border:1px solid var(--border); border-radius:24px;
    padding:2.5rem 2rem; width:100%; max-width:380px; text-align:center;
    position:relative;
  }
  .login-box::before {
    content:""; position:absolute; top:0; left:0; right:0; height:3px;
    border-radius:24px 24px 0 0;
    background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);
  }

  .login-logo { font-size:3rem; margin-bottom:0.5rem; }
  .login-title { font-family:"Reem Kufi",serif; font-size:1.4rem; color:var(--gold2); margin-bottom:0.3rem; }
  .login-sub { font-size:0.82rem; color:var(--muted); margin-bottom:2rem; }

  .pwd-input {
    width:100%; padding:0.85rem 1rem; background:var(--surface);
    border:1px solid var(--border2); border-radius:12px;
    color:var(--text); font-family:"Tajawal",sans-serif; font-size:1rem;
    text-align:center; letter-spacing:3px; margin-bottom:0.8rem; outline:none;
    transition:border-color 0.2s;
  }
  .pwd-input:focus { border-color:var(--gold); }

  .login-btn {
    width:100%; padding:0.85rem; background:linear-gradient(135deg,var(--amber),var(--gold));
    color:#0a0700; border:none; border-radius:12px; font-family:"Tajawal",sans-serif;
    font-size:1rem; font-weight:800; cursor:pointer; transition:all 0.25s;
    box-shadow:0 4px 16px rgba(212,160,23,0.35);
  }
  .login-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(212,160,23,0.5); }

  .pwd-error { color:#fca5a5; font-size:0.82rem; margin-top:0.5rem; display:none; }

  /* ADMIN PANEL */
  #admin-panel { display:none; }

  .admin-nav {
    background:rgba(10,7,0,0.95); border-bottom:1px solid var(--border);
    padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100; backdrop-filter:blur(20px);
  }
  .admin-nav-title { font-family:"Reem Kufi",serif; font-size:1.1rem; color:var(--gold2); display:flex; align-items:center; gap:0.5rem; }
  .live-badge { background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.3); color:var(--green); font-size:0.7rem; padding:0.2rem 0.6rem; border-radius:10px; font-weight:700; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.6;} }

  .admin-container { max-width:700px; margin:0 auto; padding:1.5rem; }

  .admin-header { margin-bottom:1.5rem; }
  .admin-title { font-family:"Reem Kufi",serif; font-size:1.5rem; color:var(--text); margin-bottom:0.3rem; }
  .admin-sub { font-size:0.82rem; color:var(--muted); }

  #admin-grid { display:flex; flex-direction:column; gap:1rem; }

  .admin-card {
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:1.2rem; transition:border-color 0.2s;
  }
  .admin-card:hover { border-color:rgba(212,160,23,0.3); }
  .admin-card.unavailable { opacity:0.7; }

  .admin-card-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:1rem;
  }

  .admin-card-title {
    display:flex; align-items:center; gap:0.6rem;
    font-family:"Reem Kufi",serif; font-size:1rem; font-weight:700;
  }
  .admin-emoji { font-size:1.5rem; }

  .status-toggle {
    padding:0.4rem 0.9rem; border-radius:20px; font-size:0.78rem; font-weight:700;
    cursor:pointer; transition:all 0.2s; border:none; font-family:"Tajawal",sans-serif;
  }
  .status-toggle.available { background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.3); color:var(--green); }
  .status-toggle.available:hover { background:rgba(34,197,94,0.25); }
  .status-toggle.unavailable { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; }
  .status-toggle.unavailable:hover { background:rgba(239,68,68,0.25); }

  .admin-card-body { }

  .price-row { display:flex; align-items:center; justify-content:space-between; gap:1rem; }
  .price-row label { font-size:0.82rem; color:var(--muted); flex-shrink:0; }

  .price-input-wrap { display:flex; gap:0.5rem; flex:1; }

  .price-input {
    flex:1; padding:0.55rem 0.8rem; background:var(--surface);
    border:1px solid var(--border2); border-radius:10px;
    color:var(--text); font-family:"Tajawal",sans-serif; font-size:0.9rem;
    outline:none; transition:border-color 0.2s; min-width:0;
  }
  .price-input:focus { border-color:var(--gold); }

  .save-btn {
    background:linear-gradient(135deg,var(--amber),var(--gold));
    color:#0a0700; border:none; padding:0.55rem 1rem; border-radius:10px;
    font-family:"Tajawal",sans-serif; font-size:0.8rem; font-weight:800;
    cursor:pointer; transition:all 0.2s; white-space:nowrap;
  }
  .save-btn:hover { transform:scale(1.03); box-shadow:0 4px 12px rgba(212,160,23,0.4); }

  /* TOAST */
  #toast {
    position:fixed; bottom:2rem; left:50%; transform:translateX(-50%);
    background:var(--card); border:1px solid var(--border);
    color:var(--text); padding:0.8rem 1.8rem; border-radius:30px;
    font-size:0.9rem; font-weight:700; z-index:9999;
    box-shadow:0 8px 24px rgba(0,0,0,0.4); display:none;
    transition:opacity 0.4s;
  }

  /* View site link */
  .view-site {
    display:inline-flex; align-items:center; gap:0.4rem;
    background:var(--surface); border:1px solid var(--border2);
    color:var(--muted); padding:0.45rem 1rem; border-radius:20px;
    font-size:0.8rem; text-decoration:none; transition:all 0.2s;
  }
  .view-site:hover { border-color:var(--gold); color:var(--gold); }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🔐</div>
    <div class="login-title">لوحة التحكم</div>
    <div class="login-sub">مطعم عين التونة — أدخل كلمة السر</div>
    <input type="password" id="pwd-input" class="pwd-input" placeholder="••••••••">
    <button onclick="checkPassword()" class="login-btn">🔓 دخول</button>
    <div id="pwd-error" class="pwd-error">❌ كلمة السر غير صحيحة</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <nav class="admin-nav">
    <div class="admin-nav-title">
      🐔 لوحة التحكم
      <span class="live-badge">🟢 مباشر</span>
    </div>
    <a href="https://ain-eltona.netlify.app" target="_blank" class="view-site">🌐 شوف الموقع</a>
  </nav>

  <div class="admin-container">
    <div class="admin-header">
      <div class="admin-title">إدارة القائمة 🍽️</div>
      <div class="admin-sub">التغييرات تظهر فوراً على الموقع بدون إعادة تحميل</div>
    </div>

    <div id="admin-grid">
      <div style="text-align:center;padding:2rem;color:var(--muted)">⏳ جاري التحميل...</div>
    </div>
  </div>
</div>

<div id="toast"></div>

</body>
</html>
